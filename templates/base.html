<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}TravelMate AI{% endblock %}</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TravelMate">
    <meta name="theme-color" content="#1a9fe0">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    {% block head %}{% endblock %}
</head>
<body>

<div class="app-shell">

    <nav class="navbar" id="navbar">
        <a href="/" class="logo">
            <div class="logo-mark">✈️</div>
            <span class="logo-text">TravelMate</span>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-item" id="nav-home">🏠 Home</a>
            <a href="/chat" class="nav-item" id="nav-chat">✨ AI Chat</a>
            <a href="/budget" class="nav-item" id="nav-budget">💰 Budget</a>
        </div>
    </nav>

    <main class="page-content">
        {% block content %}{% endblock %}
    </main>

    <nav class="bottom-nav">
        <a href="/" class="bnav-item" id="bnav-home">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Home</span>
        </a>
        <a href="/chat" class="bnav-item" id="bnav-chat">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            <span>AI Chat</span>
        </a>
        <a href="/budget" class="bnav-item" id="bnav-budget">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
            <span>Budget</span>
        </a>
        <a href="/dashboard" class="bnav-item" id="bnav-dash">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <span>Dashboard</span>
        </a>
    </nav>

</div>

<script>
    (function() {
        const path = window.location.pathname;
        const map  = {'/':'nav-home','/chat':'nav-chat','/budget':'nav-budget'};
        const bmap = {'/':'bnav-home','/chat':'bnav-chat','/budget':'bnav-budget','/dashboard':'bnav-dash'};
        const top = document.getElementById(map[path]);
        const bot = document.getElementById(bmap[path]);
        if(top) top.classList.add('active');
        if(bot) bot.classList.add('active');
    })();

    window.addEventListener('scroll', () => {
        document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 10);
    });

    // ── Service Worker ──────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js', { scope: '/' })
                .then(reg => console.log('[TravelMate] SW registered'))
                .catch(err => console.warn('[TravelMate] SW failed:', err));
        });
    }

    // ── Install prompt — fires on every page ────────────────────────────
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        showInstallBanner();
    });

    function showInstallBanner() {
        if (document.getElementById('pwa-banner')) return;
        const banner = document.createElement('div');
        banner.id = 'pwa-banner';
        banner.innerHTML = `
            <span>📲 Install TravelMate for offline use</span>
            <button onclick="installApp()">Install</button>
            <button onclick="this.parentElement.remove()" style="background:transparent;border:none;color:rgba(255,255,255,0.5);font-size:18px;cursor:pointer;padding:0 4px;">✕</button>
        `;
        banner.style.cssText = `
            position:fixed;bottom:72px;left:12px;right:12px;
            background:linear-gradient(135deg,#1a9fe0,#0e6fa8);
            color:white;border-radius:14px;padding:14px 16px;
            display:flex;align-items:center;gap:10px;
            box-shadow:0 4px 20px rgba(0,0,0,0.4);
            z-index:9999;font-size:14px;font-weight:500;
        `;
        banner.querySelector('button').style.cssText = `
            margin-left:auto;background:white;color:#1a9fe0;
            border:none;border-radius:20px;padding:7px 16px;
            font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;
        `;
        document.body.appendChild(banner);
    }

    function installApp() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(choice => {
            if (choice.outcome === 'accepted') {
                document.getElementById('pwa-banner')?.remove();
            }
            deferredPrompt = null;
        });
    }
</script>
</body>
</html>
